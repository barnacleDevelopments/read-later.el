name: ERT Tests

on:
  workflow_dispatch:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs-version:
          - "24.1"
          - "25.1"
          - "26.1"
          - "27.1"
          - "28.1"
          - "29.1"
          - "30.1"
          - "snapshot"
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Run ERT tests
        run: |
          emacs -batch \
            -L . \
            -l ert \
            -l read-later.el \
            -l tests/test_runner.el \
            -f ert-run-tests-batch-and-exit
