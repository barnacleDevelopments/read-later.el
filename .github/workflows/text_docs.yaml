name: Build Texinfo Documentation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**.texi"
      - "**.texinfo"

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Texinfo and TeX dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y texinfo texlive texlive-plain-generic

      - name: Build Info file
        run: makeinfo read-later.texi -o read-later.info
